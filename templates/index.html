{% extends "base.html" %} {% block content %} {% if notes %} {% for note in
notes %}
<div class="note">
	<h3>{{ note.title }}</h3>
	<p>{{ note.content }}</p>
	<div class="info">
		<span class="date">{{ note.date }}</span>
		<div class="actions">
			<a href="/edit/{{ note.id }}" class="edit">Редактировать</a>
			<a
				href="/delete/{{ note.id }}"
				class="delete"
				onclick="return confirm('Удалить?')"
				>Удалить</a
			>
		</div>
	</div>
</div>
{% endfor %} {% else %}
<div class="empty">
	<p>Нет заметок. Создайте первую!</p>
	<a href="/add" class="btn">Создать заметку</a>
</div>
{% endif %} {% endblock %}
